name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          mkdir bins
          for GOOS in linux windows; do
            for GOARCH in amd64 arm arm64 386; do
              export GOOS GOARCH
              ext=""
              [ "$GOOS" = "windows" ] && ext=".exe"
              echo "Building ${GOOS}/${GOARCH}"
              CGO_ENABLED=0 go build -o "bins/segdsp-${GOOS}-${GOARCH}${ext}" .
            done
          done

      - name: Create archives
        run: |
          cd bins
          for f in segdsp-*; do
            dir="${f%.*}"
            mkdir -p "$dir"
            cp "$f" "$dir/segdsp${f##*segdsp}"
            # content is embedded via go:embed, no need to copy
            zip -j "${f%.*}.zip" "$dir/segdsp"
            rm -rf "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bins/*.zip
          generate_release_notes: true
